<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Yash Kumar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;

box-sizing:border-box;
font-family:Poppins;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:#d4af37;
text-align:center;
}

.card{
width:340px;
padding:45px;
border-radius:18px;
background:#111;
border:1px solid #d4af37;
box-shadow:0 0 25px rgba(212,175,55,0.25);
}

.welcome{
font-size:13px;
letter-spacing:3px;

}

h1{
font-size:32px;
margin-bottom:20px;
}

.bio{
line-height:1.8;
font-size:15px;
margin-bottom:35px;
}

.btn{
display:block;
padding:14px;
border-radius:12px;
text-decoration:none;
color:black;
font-weight:600;
background:#d4af37;
transition:0.3s;
}

.btn:hover{
background:#f5d76e;
transform:scale(1.05);
}

.footer{
margin-top:25px;
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="card">

<p class="bio">
Dream big.<br>
Stay humble.<br>
Focus on the future.<br>
Building my own journey.<br>
Trust the process.<br>

<a href="https://www.instagram.com/soul_faith.x?igsh=bTVyeXkxYmR3dTZu" class="btn">

</a>

<p class="footer">
