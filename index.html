<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yash Kumar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:#d4af37;
overflow:hidden;
}

/* animated background glow */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#d4af37,transparent 70%);
opacity:0.15;
animation:rotate 18s linear infinite;
}

@keyframes rotate{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* card */

.card{
position:relative;
width:380px;
padding:50px;
border-radius:20px;
background:rgba(20,20,20,0.85);
backdrop-filter:blur(15px);
text-align:center;
border:1px solid rgba(212,175,55,0.5);
box-shadow:0 0 30px rgba(212,175,55,0.2);
}

/* animated border */

.card::before{
content:"";
position:absolute;
top:-2px;
left:-2px;
right:-2px;
bottom:-2px;
border-radius:20px;
background:linear-gradient(45deg,#d4af37,transparent,#d4af37);
z-index:-1;
animation:borderGlow 6s linear infinite;
}

@keyframes borderGlow{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}
}

.welcome{
font-size:13px;
letter-spacing:4px;
opacity:0.8;
margin-bottom:15px;
}

h1{
font-size:34px;
margin-bottom:25px;
font-weight:600;
}

.bio{
line-height:1.9;
font-size:15px;
margin-bottom:35px;
}

/* instagram button */

.btn{
display:block;
padding:15px;
border-radius:14px;
text-decoration:none;
color:black;
font-weight:600;
background:#d4af37;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 0 20px rgba(212,175,55,0.7);
}

.footer{
margin-top:30px;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="card">

<p class="welcome">WELCOME</p>

<h1>Yash Kumar</h1>

<p class="bio">
Dream big.<br>
Stay humble.<br>
Focus on the future.<br>
Building my own journey.<br>
Trust the process.<br>
The journey has just begun.
</p>

<a href="https://www.instagram.com/soul_faith.x?igsh=bTVyeXkxYmR3dTZu" class="btn">
Follow me on Instagram
</a>

<p class="footer">
Thanks for visiting ✨
</p>

</div>

</body>
</html>
