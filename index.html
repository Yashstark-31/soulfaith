<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yash Kumar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.card{
width:340px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.welcome{
font-size:14px;
letter-spacing:2px;
opacity:0.7;
margin-bottom:15px;
}

h1{
font-size:30px;
margin-bottom:20px;
}

.bio{
line-height:1.8;
opacity:0.9;
margin-bottom:30px;
}

.btn{
display:block;
padding:14px;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:500;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(255,75,43,0.7);
}

.footer{
margin-top:25px;
font-size:13px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="card">

<p class="welcome">WELCOME</p>

<h1>Yash Kumar</h1>

<p class="bio">
Dream big.<br>
Stay humble.<br>
Focus on the future.<br>
Building my own journey.<br>
Trust the process.<br>
The journey has just begun.
</p>

<a href="https://www.instagram.com/soul_faith.x?igsh=bTVyeXkxYmR3dTZu" class="btn">
Follow me on Instagram
</a>

<p class="footer">
Thanks for visiting ✨
</p>

</div>

</body>
</html>
