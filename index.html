<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yash Kumar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:Poppins;
background:radial-gradient(circle at top,#1a1a1a,#000);
color:white;
text-align:center;
}

.container{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
max-width:750px;
margin:auto;
padding:30px;
}

h1{
font-family:'Playfair Display';
font-size:42px;
color:gold;
margin-bottom:10px;
}

.tag{
opacity:0.85;
margin-bottom:30px;
}

.section{
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,215,0,0.3);
padding:22px;
border-radius:18px;
margin-top:10px;
transition:0.4s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(255,215,0,0.2);
}

.btn{
display:block;
margin:25px auto;
padding:14px;
width:200px;
border-radius:14px;
text-decoration:none;
background:linear-gradient(45deg,gold,#ffd700);
color:black;
font-weight:600;
transition:0.4s;
}

.btn:hover{
transform:scale(1.07);
box-shadow:0 0 20px rgba(255,215,0,0.7);
}

footer{
margin-top:40px;
opacity:0.6;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Yash Kumar</h1>

<p class="tag">
Gamer • Website Creator
</p>

<div class="section">
<h2>About Me</h2>
<div class="card">
I enjoy coding, exploring technology and playing games.
I love building cool things on the internet.
</div>
</div>

<div class="section">
<h2>Hobbies</h2>
<div class="card">
🎮 BGMI Gaming<br>
💻 Coding<br>
🌐 Creating Websites
</div>
</div>

<div class="section">
<h2>Follow Me</h2>
<a class="btn" href="#">Instagram</a>
</div>

<footer>
© Yash Kumar
</footer>

</div>

</body>
</html>
