<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yash Kumar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Poppins;
background:radial-gradient(circle at top,#1a1a1a,#000);
color:white;
text-align:center;
overflow-x:hidden;
}

/* smooth fade animation */
.container{
max-width:750px;
margin:auto;
padding:40px;
animation:fade 1.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.profile{
width:130px;
height:130px;
border-radius:50%;
border:3px solid gold;
box-shadow:0 0 20px rgba(255,215,0,0.5);
object-fit:cover;
transition:0.5s;
}

.profile:hover{
transform:scale(1.05);
}

h1{
font-family:'Playfair Display';
font-size:42px;
color:gold;
margin:15px 0;
letter-spacing:1px;
}

.about{
opacity:0.85;
}

.section{
margin-top:50px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,215,0,0.3);
padding:22px;
border-radius:18px;
margin-top:15px;
transition:0.4s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(255,215,0,0.2);
}

.btn{
display:block;
margin:18px auto;
padding:14px;
width:200px;
border-radius:14px;
text-decoration:none;
background:linear-gradient(45deg,gold,#ffd700);
color:black;
font-weight:600;
transition:0.4s;
}

.btn:hover{
transform:scale(1.07);
box-shadow:0 0 20px rgba(255,215,0,0.7);
}

footer{
margin-top:50px;
opacity:0.6;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<img class="profile" src="https://i.imgur.com/2DhmtJ4.png">

<h1>Yash Kumar</h1>

<p class="about">
Tech Lover • Gamer • Website Creator
</p>

<div class="section">
<h2>About Me</h2>
<div class="card">
I enjoy coding, exploring technology and playing games.
I love building cool things on the internet.
</div>
</div>

<div class="section">
<h2>Hobbies</h2>
<div class="card">
🎮 BGMI Gaming<br>
💻 Coding<br>
🌐 Creating Websites
</div>
</div>

<div class="section">
<h2>Follow Me</h2>
<a class="btn" href="#">Instagram</a>
</div>

<footer>
© Yash Kumar
</footer>

</div>

</body>
</html>
