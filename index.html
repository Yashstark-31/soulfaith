<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yash Kumar</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins;
background:#000;
color:#d4af37;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
overflow:hidden;
}

/* background glow */

body::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle,#d4af37,transparent 70%);
opacity:0.12;
animation:spin 18s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.container{
width:92%;
max-width:480px;
position:relative;
}

/* title */

h1{
font-family:'Playfair Display';
font-size:46px;
color:#d4af37;
margin-bottom:10px;
}

.tag{
font-size:16px;
letter-spacing:3px;
margin-bottom:30px;
opacity:0.8;
}

/* sections */

.section{
margin-top:28px;
}

/* premium card */

.card{
background:rgba(20,20,20,0.85);
border:1px solid rgba(212,175,55,0.4);
padding:24px;
border-radius:18px;
font-size:16px;
line-height:1.8;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(212,175,55,0.2);
}

/* instagram button */

.btn{
display:inline-block;
margin-top:25px;
padding:16px 40px;
border-radius:16px;
text-decoration:none;
background:linear-gradient(45deg,#d4af37,#ffd700);
color:black;
font-weight:600;
font-size:18px;
transition:0.35s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(212,175,55,0.8);
}

footer{
margin-top:35px;
font-size:13px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<p class="tag">WELCOME</p>

<h1>Yash Kumar</h1>

<div class="section">

<div class="card">

Dream big.<br>
Stay humble.<br>
Focus on the future.<br>
Building my own journey.<br>
Trust the process.<br>
The journey has just begun.

</div>

</div>

<div class="section">

<a class="btn"
href="https://www.instagram.com/soul_faith.x?igsh=bTVyeXkxYmR3dTZu"
target="_blank">

Follow me on Instagram

</a>

</div>

<footer>
Thanks for visiting ✨
</footer>

</div>

</body>
</html>
